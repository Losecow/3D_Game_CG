<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.2rem; color: #fff; }
    header span { font-size: 0.85rem; color: #888; }

    #error-box {
      display: none;
      margin: 40px auto;
      max-width: 500px;
      background: #2d1b1b;
      border: 1px solid #7f3535;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      color: #f87171;
    }

    #main { display: none; padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* 통계 카드 */
    #stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 20px;
    }

    .stat-card .label { font-size: 0.75rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #fff; }

    /* 탭 */
    #tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #2d3148;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #7c9cff; border-bottom-color: #7c9cff; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 테이블 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .data-table th {
      background: #1a1d27;
      color: #888;
      font-weight: 500;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #2d3148;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .data-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #1e2133;
      vertical-align: middle;
    }

    .data-table tr:hover td { background: #1a1d27; }

    .user-cell { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: #2d3148; }
    .no-avatar { width: 28px; height: 28px; border-radius: 50%; background: #2d3148; }

    .num   { color: #7c9cff; font-weight: 600; }
    .dim   { color: #666; font-size: 0.8rem; }
    .wm    { color: #4ade80; }
    .email { color: #888; font-size: 0.8rem; }

    .feedback-content { white-space: pre-wrap; line-height: 1.5; max-width: 500px; }

    #load-more-btn {
      display: block;
      margin: 20px auto 0;
      background: #2d3148;
      color: #ccc;
      border: none;
      padding: 10px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    #load-more-btn:hover { background: #3a3f5c; }
    #load-more-btn:disabled { opacity: 0.4; cursor: default; }

    .loading { text-align: center; color: #555; padding: 40px; }
  </style>
</head>
<body>

<header>
  <h1>🍉 관리자 대시보드</h1>
  <span id="admin-email"></span>
</header>

<div id="error-box"></div>

<div id="main">
  <div id="stats-grid">
    <div class="stat-card"><div class="label">총 유저</div><div class="value" id="s-users">-</div></div>
    <div class="stat-card"><div class="label">총 게임 수</div><div class="value" id="s-games">-</div></div>
    <div class="stat-card"><div class="label">평균 점수</div><div class="value" id="s-avg">-</div></div>
    <div class="stat-card"><div class="label">최고 점수</div><div class="value" id="s-max">-</div></div>
    <div class="stat-card"><div class="label">총 수박 🍉</div><div class="value" id="s-wm">-</div></div>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-tab="users">유저 목록</button>
    <button class="tab-btn" data-tab="scores">점수 기록</button>
    <button class="tab-btn" data-tab="feedback">피드백</button>
  </div>

  <div id="tab-users" class="tab-panel active">
    <div class="loading">불러오는 중...</div>
  </div>

  <div id="tab-scores" class="tab-panel">
    <div class="loading">불러오는 중...</div>
  </div>

  <div id="tab-feedback" class="tab-panel">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<script type="module" src="/src/admin.js"></script>
</body>
</html>
