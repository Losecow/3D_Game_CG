<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 수박게임</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <!-- Three.js 캔버스 -->
    <div id="canvas-container"></div>

    <!-- 유저 정보 (좌상단, 로그인 시만 표시) -->
    <div id="auth-panel">
      <div id="user-info" class="hidden">
        <img id="user-avatar" src="" alt="" />
        <span id="user-name"></span>
        <button id="nickname-edit-btn" title="닉네임 변경">✏️</button>
        <button id="logout-btn">로그아웃</button>
      </div>
    </div>

    <!-- 구글 로그인 + 설정 버튼 (우하단) -->
    <div id="signin-area">
      <div id="google-signin-btn"></div>
      <button id="settings-btn">⚙️</button>
    </div>

    <!-- 점수 / 다음 과일 UI (우상단) -->
    <div id="ui">
      <div id="score-panel">
        <div class="score-label">점수 / SCORE</div>
        <div id="score">0</div>
        <div class="score-label">최고 점수 / BEST</div>
        <div id="best-score">0</div>
      </div>

      <div id="next-panel">
        <div id="fruit-previews">
          <div class="fruit-preview-col">
            <div class="score-label">현재 / NOW</div>
            <canvas id="current-fruit-preview" width="72" height="72"></canvas>
          </div>
          <div class="preview-arrow">▶</div>
          <div class="fruit-preview-col">
            <div class="score-label">다음 / NEXT</div>
            <canvas id="next-fruit-preview" width="52" height="52"></canvas>
          </div>
        </div>
      </div>

      <button id="leaderboard-btn">🏆 리더보드</button>
      <button id="splitview-btn">⊞ 분할 뷰</button>
    </div>

    <!-- 게임 오버 화면 -->
    <div id="game-over" class="hidden">
      <div id="game-over-box">
        <h2>GAME OVER</h2>
        <div id="new-record" class="hidden">신기록!</div>
        <p>점수 / Score: <span id="final-score">0</span></p>
        <p>최고 점수 / Best: <span id="final-best">0</span></p>
        <div id="score-submit-status"></div>
        <div id="game-over-actions">
          <button id="gameover-leaderboard-btn">🏆 리더보드</button>
          <button id="restart-btn">다시 시작 / Restart</button>
        </div>
      </div>
    </div>

    <!-- 닉네임 설정 모달 -->
    <div id="nickname-modal" class="hidden">
      <div id="nickname-box">
        <h3>닉네임 설정</h3>
        <input id="nickname-input" type="text" maxlength="20" placeholder="닉네임 입력 (최대 20자)" />
        <p id="nickname-error" class="hidden"></p>
        <div id="nickname-actions">
          <button id="nickname-cancel">취소</button>
          <button id="nickname-save">저장</button>
        </div>
      </div>
    </div>

    <!-- 리더보드 모달 -->
    <div id="leaderboard-modal" class="hidden">
      <div id="leaderboard-box">
        <div id="leaderboard-header">
          <h2>🏆 리더보드</h2>
          <button id="leaderboard-close">×</button>
        </div>
        <div id="leaderboard-list">
          <div class="leaderboard-loading">불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 설정 모달 -->
    <div id="settings-modal" class="hidden">
      <div id="settings-box">
        <div id="settings-header">
          <h2>⚙️ 설정</h2>
          <button id="settings-close">×</button>
        </div>

        <div class="settings-row">
          <span class="settings-label">🔊 사운드 볼륨</span>
          <div class="settings-right">
            <input type="range" id="volume-slider" min="0" max="100" step="5" value="50" />
            <span id="volume-value">50%</span>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">⊞ 분할 뷰</span>
          <button id="settings-splitview-toggle" class="settings-toggle">OFF</button>
        </div>

        <div class="settings-row">
          <span class="settings-label">🎯 드롭 방식</span>
          <div class="drop-mode-group">
            <button id="drop-mode-click" class="mode-btn active">클릭</button>
            <button id="drop-mode-space" class="mode-btn">스페이스바</button>
          </div>
        </div>

        <div class="settings-row settings-danger-row">
          <span class="settings-label">⏹ 게임 종료</span>
          <button id="settings-quit-btn" class="settings-danger-btn">종료</button>
        </div>
      </div>
    </div>

    <!-- 조작 안내 -->
    <div id="controls-hint">
      클릭: 과일 드롭 | 드래그: 카메라 회전 | 스크롤: 줌<br/>
      Click: Drop | Drag: Rotate | Scroll: Zoom
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
